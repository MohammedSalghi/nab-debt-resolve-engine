# Netlify build configuration for TanStack Start (Nitro `netlify` preset).
# Nitro emits:
#   - static assets → dist/
#   - SSR handler   → .netlify/functions-internal/server.mjs (+ redirect rules)
# We only need to point Netlify at the build command, publish dir, and Node version.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"
